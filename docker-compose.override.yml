# Dev overrides — automatically loaded by `docker compose up`
# Only overrides api (hot-reload). Web runs as nginx on :3000 (base config).
# For frontend hot-reload: run `cd web && npm run dev` locally instead.

services:
  api:
    volumes:
      - ./api/app:/api/app:ro
      - ./seed:/seed:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      SEED_DIR: /seed/data
