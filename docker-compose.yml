# SANJAYA WebGIS — Docker Compose
# Phase 0: core services run by default. Heavy services (geoserver, worker, fleet-ingest) use --profile full
# Usage: cp .env.example .env && docker compose up -d

version: '3.9'

services:

  # ── DATA LAYER ────────────────────────────────────────────────────────────────

  postgis:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanjaya
      POSTGRES_USER: sanjaya
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanjaya -d sanjaya"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescale:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanjaya_ts
      POSTGRES_USER: sanjaya
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - tsdata:/home/postgres/pgdata/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanjaya -d sanjaya_ts"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
      - "9883:9883"

  # ── APPLICATION LAYER ─────────────────────────────────────────────────────────

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      SEED_DIR: /seed/data
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,${FRONTEND_URL:-}"
      DATABASE_URL: postgresql://sanjaya:${DB_PASSWORD}@postgis:5432/sanjaya
      TIMESCALE_URL: postgresql://sanjaya:${DB_PASSWORD}@timescale:5432/sanjaya_ts
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./seed:/seed:ro
    ports:
      - "8000:8000"
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  # ── GEOSPATIAL SERVICES ───────────────────────────────────────────────────────

  geo-api:
    image: geopython/pygeoapi:latest
    restart: unless-stopped
    environment:
      PYGEOAPI_CONFIG: /pygeoapi/config.yml
      PYGEOAPI_OPENAPI: /pygeoapi/openapi.yml
    volumes:
      - ./config/pygeoapi.yml:/pygeoapi/config.yml:ro
    ports:
      - "5000:80"

  # ── HEAVY SERVICES (start with: docker compose --profile full up -d) ──────────

  geoserver:
    image: kartoza/geoserver:2.25.2
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_PASSWORD:-sanjayageoserver}
      INITIAL_MEMORY: 512M
      MAXIMUM_MEMORY: 2G
    volumes:
      - geoserverdata:/opt/geoserver/data_dir
    ports:
      - "8600:8080"
    profiles:
      - full

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.celery_app worker -l info -c 2
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://sanjaya:${DB_PASSWORD}@postgis:5432/sanjaya
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SEED_DIR: /seed/data
    volumes:
      - ./seed:/seed:ro
    depends_on:
      - redis
      - postgis
    profiles:
      - full

  fleet-ingest:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m app.fleet_ingest
    environment:
      TIMESCALE_URL: postgresql://sanjaya:${DB_PASSWORD}@timescale:5432/sanjaya_ts
      MQTT_BROKER: mqtt
      MQTT_PORT: "1883"
    depends_on:
      - mqtt
      - timescale
    profiles:
      - full

volumes:
  pgdata:
  tsdata:
  redisdata:
  miniodata:
  geoserverdata:
